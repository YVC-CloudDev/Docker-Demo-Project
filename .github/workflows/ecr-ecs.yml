# ═══════════════════════════════════════════════════════════════════
#  Option 4: Full Pipeline — Build → ECR → Deploy to ECS
# ═══════════════════════════════════════════════════════════════════
#
#  SETUP REQUIRED:
#  1. Complete Option 3 setup first (ECR repo + AWS credentials)
#
#  2. Create ECS resources:
#     - ECS Cluster (Fargate)
#     - ECS Task Definition (see task-definition.json in this repo)
#     - ECS Service
#
#  3. Add GitHub Secrets:
#     - AWS_ACCESS_KEY_ID
#     - AWS_SECRET_ACCESS_KEY
#
#  4. Add GitHub Variables (Settings → Variables → Actions):
#     - AWS_REGION        (e.g., us-east-1)
#     - ECR_REPOSITORY    (e.g., cloudship)
#     - ECS_CLUSTER       (e.g., cloudship-cluster)
#     - ECS_SERVICE       (e.g., cloudship-service)
#     - CONTAINER_NAME    (e.g., cloudship)
#
# ═══════════════════════════════════════════════════════════════════

name: "Option 4: ECR + ECS Deploy"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build → ECR → Deploy ECS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ vars.CONTAINER_NAME }} \
            --query taskDefinition \
            > current-task-def.json

      - name: Update task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: current-task-def.json
          container-name: ${{ vars.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ vars.ECS_SERVICE }}
          cluster: ${{ vars.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Summary
        run: |
          echo "## 🚀 Deployed to ECS!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ steps.build-image.outputs.image }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Cluster:** ${{ vars.ECS_CLUSTER }}" >> $GITHUB_STEP_SUMMARY
          echo "**Service:** ${{ vars.ECS_SERVICE }}" >> $GITHUB_STEP_SUMMARY
