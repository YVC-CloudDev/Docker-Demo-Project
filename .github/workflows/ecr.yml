# ═══════════════════════════════════════════════════════════════════
#  Option 3: Build & Push to AWS ECR (Elastic Container Registry)
# ═══════════════════════════════════════════════════════════════════
#
#  AUTHENTICATION: AWS OIDC (assume role — no static keys!)
#
#  SETUP REQUIRED:
#  1. Create ECR repository:
#     aws ecr create-repository --repository-name cloudship --region us-east-1
#
#  2. Create IAM OIDC Identity Provider in AWS:
#     - Provider URL: https://token.actions.githubusercontent.com
#     - Audience: sts.amazonaws.com
#
#  3. Create IAM Role with trust policy for GitHub Actions:
#     (see README for full trust policy JSON)
#
#  4. Add GitHub Secrets:
#     - AWS_ROLE_ARN  (e.g., arn:aws:iam::123456789012:role/github-actions-ecr)
#
#  5. Add GitHub Variables (Settings → Variables → Actions):
#     - AWS_REGION        (e.g., us-east-1)
#     - ECR_REPOSITORY    (e.g., cloudship)
#
# ═══════════════════════════════════════════════════════════════════

name: "Option 3: AWS ECR"

on:
  workflow_dispatch:  # Manual trigger only

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:latest $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Summary
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
        run: |
          echo "## ✅ Pushed to AWS ECR" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`$ECR_REGISTRY/$ECR_REPOSITORY:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** ${{ vars.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
