# ═══════════════════════════════════════════════════════════════════
#  Option 2: Build & Push to GitHub Container Registry (GHCR)
# ═══════════════════════════════════════════════════════════════════
#
#  SETUP REQUIRED:
#  ✅ NONE! GHCR uses your GitHub token automatically.
#     No secrets to configure. Just enable the workflow.
#
#  The image will be available at:
#     ghcr.io/<your-github-username>/cloudship:latest
#
#  MULTI-PLATFORM SUPPORT:
#  This workflow builds a single image that supports:
#    • linux/amd64  → Linux x86_64 servers, Windows (Docker Desktop + WSL2)
#    • linux/arm64  → macOS Apple Silicon (M1/M2/M3), AWS Graviton, Raspberry Pi 4+
#    • linux/arm/v7 → Raspberry Pi 2/3 and older ARM devices
#
# ═══════════════════════════════════════════════════════════════════

name: "Option 2: GitHub Container Registry"

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Multi-Platform Image to GHCR
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (cross-platform emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64,linux/arm/v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=
            type=ref,event=branch

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## ✅ Multi-Platform Image Pushed to GitHub Container Registry" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🖥️ Supported Platforms" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Runs On |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| \`linux/amd64\` | Linux x86_64, Windows (Docker Desktop + WSL2) |" >> $GITHUB_STEP_SUMMARY
          echo "| \`linux/arm64\` | macOS Apple Silicon (M1/M2/M3), AWS Graviton, Raspberry Pi 4+ |" >> $GITHUB_STEP_SUMMARY
          echo "| \`linux/arm/v7\` | Raspberry Pi 2/3, older ARM devices |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚀 Pull & Run" >> $GITHUB_STEP_SUMMARY
          echo "Docker automatically pulls the correct variant for your machine:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "docker run -d -p 8080:80 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔍 Inspect Manifests" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
